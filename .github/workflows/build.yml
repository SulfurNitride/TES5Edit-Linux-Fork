# =============================================================================
# xEdit Rust Port - CI Build Workflow
# =============================================================================
# Builds Linux AppImage from an Ubuntu runner.

name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux build: test, compile Rust + Lazarus, package AppImage
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux x86_64 (AppImage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Rust toolchain --
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: linux-cargo-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: linux-cargo-

      # -- Rust tests --
      - name: Run workspace tests
        working-directory: rust-core
        run: cargo test --workspace

      # -- Rust release build --
      - name: Build xedit_ffi (release)
        working-directory: rust-core
        run: cargo build --release -p xedit_ffi

      # -- nifly (NIF file support) --
      - name: Cache nifly build
        uses: actions/cache@v4
        with:
          path: |
            rust-core/xedit_nif/nifly/build
            rust-core/xedit_nif/nifly_wrapper/build
          key: nifly-${{ hashFiles('rust-core/xedit_nif/nifly/src/**', 'rust-core/xedit_nif/nifly/include/**', 'rust-core/xedit_nif/nifly_wrapper/*.cpp', 'rust-core/xedit_nif/nifly_wrapper/*.h') }}

      - name: Build nifly and nifly_wrapper
        run: |
          # Build nifly static library
          cd rust-core/xedit_nif/nifly
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF \
                   -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          make -j$(nproc)

          # Build the wrapper shared library
          cd ../../nifly_wrapper
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ls -la libnifly_wrapper.so

      # -- Lazarus / FPC + Qt6 --
      - name: Install Lazarus, FPC, and Qt6 development packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            lazarus fpc \
            qt6-base-dev qt6-wayland libgl1-mesa-dev \
            kde-style-breeze-qt6

      - name: Cache Qt6Pas build
        id: cache-qt6pas
        uses: actions/cache@v4
        with:
          path: /tmp/qt6pas-installed
          key: qt6pas-${{ hashFiles('patches/qt6pas-wayland-menu-transient-parent.patch') }}-${{ runner.os }}

      - name: Build patched libQt6Pas.so
        if: steps.cache-qt6pas.outputs.cache-hit != 'true'
        run: |
          # Find the qt6pas cbindings source from the Lazarus installation
          QT6PAS_SRC=$(find /usr -type d -name cbindings -path '*/qt6/*' 2>/dev/null | head -1)
          if [ -z "$QT6PAS_SRC" ] || [ ! -d "$QT6PAS_SRC" ]; then
            echo "ERROR: qt6pas cbindings not found under /usr"
            find /usr -name 'Qt6Pas.pro' 2>/dev/null || true
            exit 1
          fi
          echo "Found qt6pas cbindings at: $QT6PAS_SRC"
          cp -r "$QT6PAS_SRC" /tmp/qt6pas-build
          cd /tmp/qt6pas-build

          # Apply C++ patches (transient parent for Wayland menus/combos)
          patch -p1 < "$GITHUB_WORKSPACE/patches/qt6pas-wayland-menu-transient-parent.patch" || true

          # Build with qmake6
          qmake6 Qt6Pas.pro
          make -j$(nproc)

          # Save built artifacts for caching
          mkdir -p /tmp/qt6pas-installed
          make INSTALL_ROOT=/tmp/qt6pas-installed install

      - name: Install patched libQt6Pas.so
        run: |
          # Install from cache or fresh build
          if [ -d /tmp/qt6pas-installed ]; then
            sudo cp -r /tmp/qt6pas-installed/* /
            sudo ldconfig
          fi

          # Apply Pascal patch to LCL qtwidgets.pas
          QT6PAS_SRC=$(find /usr -type d -name cbindings -path '*/qt6/*' 2>/dev/null | head -1)
          if [ -n "$QT6PAS_SRC" ]; then
            QT6_IFACE_DIR=$(dirname "$QT6PAS_SRC")
            cd "$QT6_IFACE_DIR"
            sudo patch -p1 < "$GITHUB_WORKSPACE/patches/qt6pas-remove-returnpressed-disconnect.patch" || true
          fi

      - name: Build Lazarus GUI (Qt6)
        run: |
          lazbuild --build-all --widgetset=qt6 lazarus-gui/xEditLaz.lpi

      # -- Package AppImage --
      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Assemble AppDir and build AppImage
        run: |
          # Create the AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/lib \
                   AppDir/usr/plugins \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy binaries (rename libxedit_ffi.so to libxedit_core.so to match Pascal expectation)
          cp rust-core/target/release/libxedit_ffi.so AppDir/usr/lib/libxedit_core.so
          cp rust-core/xedit_nif/nifly_wrapper/build/libnifly_wrapper.so AppDir/usr/lib/
          cp lazarus-gui/xEditLaz AppDir/usr/bin/
          chmod +x AppDir/usr/bin/xEditLaz

          # Bundle patched libQt6Pas
          find /usr/lib -name 'libQt6Pas.so*' -exec cp -P {} AppDir/usr/lib/ \;

          # ── Bundle ALL shared library dependencies ──
          # Same approach as the MO2 Linux port: use ldd to find everything,
          # skip only core system libs that must come from the host.
          SKIP_PATTERN="linux-vdso|ld-linux|libc\.so|libm\.so|libdl\.so|librt\.so|libpthread|libresolv|libnss|libgcc_s|libstdc\+\+"
          SKIP_PATTERN="${SKIP_PATTERN}|libGL\.so|libEGL|libGLX|libGLdispatch|libdrm|libvulkan"
          SKIP_PATTERN="${SKIP_PATTERN}|libX11|libxcb\.so|libwayland-client|libwayland-server|libwayland-cursor|libwayland-egl"

          collect_deps() {
            ldd "$1" 2>/dev/null | grep "=>" | awk '{print $3}' | grep "^/" | sort -u
          }

          ALL_DEPS=$(mktemp)
          collect_deps AppDir/usr/bin/xEditLaz >> "$ALL_DEPS"
          for lib in AppDir/usr/lib/*.so*; do
            [ -f "$lib" ] && collect_deps "$lib" >> "$ALL_DEPS"
          done

          sort -u "$ALL_DEPS" | while read -r dep; do
            dep_name="$(basename "$dep")"
            echo "$dep_name" | grep -qE "$SKIP_PATTERN" && continue
            [ -f "AppDir/usr/lib/$dep_name" ] && continue
            cp -Lf "$dep" AppDir/usr/lib/ 2>/dev/null || true
          done
          rm -f "$ALL_DEPS"

          # ── Qt6 platform plugins ──
          QT6_PLUGIN_DIR=$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || echo "/usr/lib/x86_64-linux-gnu/qt6/plugins")
          if [ -d "$QT6_PLUGIN_DIR" ]; then
            for plugin_type in platforms platformthemes imageformats styles \
                               xcbglintegrations egldeviceintegrations \
                               wayland-shell-integration \
                               wayland-decoration-client wayland-graphics-integration-client; do
              if [ -d "$QT6_PLUGIN_DIR/$plugin_type" ]; then
                cp -a "$QT6_PLUGIN_DIR/$plugin_type" AppDir/usr/plugins/
              fi
            done

            # Bundle deps of Qt plugins too
            find AppDir/usr/plugins -name "*.so" -exec sh -c '
              ldd "$1" 2>/dev/null | grep "=>" | awk "{print \$3}" | grep "^/" | while read dep; do
                dep_name="$(basename "$dep")"
                echo "$dep_name" | grep -qE "'"$SKIP_PATTERN"'" && continue
                [ -f "AppDir/usr/lib/$dep_name" ] && continue
                cp -Lf "$dep" AppDir/usr/lib/ 2>/dev/null || true
              done
            ' _ {} \;
          fi

          # Copy desktop integration files
          cp AppDir/xedit.desktop AppDir/usr/share/applications/xedit.desktop

          # Placeholder icon
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" \
            | base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/xedit.png
          ln -sf usr/share/icons/hicolor/256x256/apps/xedit.png AppDir/xedit.png
          ln -sf usr/share/icons/hicolor/256x256/apps/xedit.png AppDir/.DirIcon

          chmod +x AppDir/AppRun

          # Show what we bundled
          echo "=== Bundled libraries ==="
          ls AppDir/usr/lib/ | head -40
          echo "=== Bundled plugins ==="
          find AppDir/usr/plugins -name "*.so" | sort

          # Build AppImage
          export ARCH=x86_64
          /tmp/appimagetool --appimage-extract-and-run AppDir/ xEditLaz-x86_64.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: xEditLaz-linux-x86_64
          path: xEditLaz-x86_64.AppImage

  # ---------------------------------------------------------------------------
  # Release: create a GitHub release on tag push
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: xEditLaz-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            xEditLaz-x86_64.AppImage
