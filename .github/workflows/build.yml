# =============================================================================
# xEdit Rust Port - CI Build Workflow
# =============================================================================
# Builds Linux AppImage and Windows zip from GitHub Actions runners.

name: Build

on:
  push:
    branches: [main, master, dev-4.1.6]
    tags: ["v*"]
  pull_request:
    branches: [main, master, dev-4.1.6]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux build: test, compile Rust + Qt6 C++ GUI, package AppImage
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux x86_64 (AppImage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -- Rust toolchain --
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: linux-cargo-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: linux-cargo-

      # -- Rust tests --
      - name: Run workspace tests
        working-directory: rust-core
        run: cargo test --workspace

      # -- Rust release build --
      - name: Build xedit_ffi (release)
        working-directory: rust-core
        run: cargo build --release -p xedit_ffi

      # -- nifly (NIF file support) --
      - name: Cache nifly build
        uses: actions/cache@v4
        with:
          path: |
            rust-core/xedit_nif/nifly/build
            rust-core/xedit_nif/nifly_wrapper/build
          key: nifly-linux-${{ hashFiles('rust-core/xedit_nif/nifly/src/**', 'rust-core/xedit_nif/nifly/include/**', 'rust-core/xedit_nif/nifly_wrapper/*.cpp', 'rust-core/xedit_nif/nifly_wrapper/*.h') }}

      - name: Build nifly and nifly_wrapper
        run: |
          # Build nifly static library
          cd rust-core/xedit_nif/nifly
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF \
                   -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          make -j$(nproc)

          # Build the wrapper shared library
          cd ../../nifly_wrapper
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ls -la libnifly_wrapper.so

      # -- Qt6 C++ GUI --
      - name: Install Qt6 and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            qt6-base-dev qt6-wayland libgl1-mesa-dev

      - name: Build Qt6 C++ GUI
        run: |
          cd qt-gui
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          ls -la build/xEdit

      # -- Package AppImage --
      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Assemble AppDir and build AppImage
        run: |
          # Create the AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/lib \
                   AppDir/usr/plugins \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy binaries
          cp rust-core/target/release/libxedit_ffi.so AppDir/usr/lib/
          cp rust-core/xedit_nif/nifly_wrapper/build/libnifly_wrapper.so AppDir/usr/lib/
          cp qt-gui/build/xEdit AppDir/usr/bin/
          chmod +x AppDir/usr/bin/xEdit

          # ── Bundle ALL shared library dependencies ──
          SKIP_PATTERN="linux-vdso|ld-linux|libc\.so|libm\.so|libdl\.so|librt\.so|libpthread|libresolv|libnss|libgcc_s|libstdc\+\+"
          SKIP_PATTERN="${SKIP_PATTERN}|libGL\.so|libEGL|libGLX|libGLdispatch|libdrm|libvulkan"
          SKIP_PATTERN="${SKIP_PATTERN}|libX11|libxcb\.so|libwayland-client|libwayland-server|libwayland-cursor|libwayland-egl"

          collect_deps() {
            ldd "$1" 2>/dev/null | grep "=>" | awk '{print $3}' | grep "^/" | sort -u
          }

          ALL_DEPS=$(mktemp)
          collect_deps AppDir/usr/bin/xEdit >> "$ALL_DEPS"
          for lib in AppDir/usr/lib/*.so*; do
            [ -f "$lib" ] && collect_deps "$lib" >> "$ALL_DEPS"
          done

          sort -u "$ALL_DEPS" | while read -r dep; do
            dep_name="$(basename "$dep")"
            echo "$dep_name" | grep -qE "$SKIP_PATTERN" && continue
            [ -f "AppDir/usr/lib/$dep_name" ] && continue
            cp -Lf "$dep" AppDir/usr/lib/ 2>/dev/null || true
          done
          rm -f "$ALL_DEPS"

          # ── Qt6 platform plugins ──
          QT6_PLUGIN_DIR=$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || echo "/usr/lib/x86_64-linux-gnu/qt6/plugins")
          if [ -d "$QT6_PLUGIN_DIR" ]; then
            for plugin_type in platforms imageformats \
                               xcbglintegrations egldeviceintegrations \
                               wayland-shell-integration \
                               wayland-decoration-client wayland-graphics-integration-client; do
              if [ -d "$QT6_PLUGIN_DIR/$plugin_type" ]; then
                cp -a "$QT6_PLUGIN_DIR/$plugin_type" AppDir/usr/plugins/
              fi
            done

            # Bundle deps of Qt plugins too
            find AppDir/usr/plugins -name "*.so" -exec sh -c '
              ldd "$1" 2>/dev/null | grep "=>" | awk "{print \$3}" | grep "^/" | while read dep; do
                dep_name="$(basename "$dep")"
                echo "$dep_name" | grep -qE "'"$SKIP_PATTERN"'" && continue
                [ -f "AppDir/usr/lib/$dep_name" ] && continue
                cp -Lf "$dep" AppDir/usr/lib/ 2>/dev/null || true
              done
            ' _ {} \;
          fi

          # Copy desktop integration files
          cp AppDir/xedit.desktop AppDir/usr/share/applications/xedit.desktop

          # Placeholder icon
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" \
            | base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/xedit.png
          ln -sf usr/share/icons/hicolor/256x256/apps/xedit.png AppDir/xedit.png
          ln -sf usr/share/icons/hicolor/256x256/apps/xedit.png AppDir/.DirIcon

          chmod +x AppDir/AppRun

          # Show what we bundled
          echo "=== Bundled libraries ==="
          ls AppDir/usr/lib/ | head -40
          echo "=== Bundled plugins ==="
          find AppDir/usr/plugins -name "*.so" | sort

          # Build AppImage
          export ARCH=x86_64
          /tmp/appimagetool --appimage-extract-and-run AppDir/ xEdit-x86_64.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: xEdit-linux-x86_64
          path: xEdit-x86_64.AppImage

  # ---------------------------------------------------------------------------
  # Windows build: compile Rust + Qt6 C++ GUI, package zip
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -- Rust toolchain --
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            rust-core\target
          key: windows-cargo-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: windows-cargo-

      # -- Rust tests --
      - name: Run workspace tests
        working-directory: rust-core
        run: cargo test --workspace

      # -- Rust release build --
      - name: Build xedit_ffi (release)
        working-directory: rust-core
        run: cargo build --release -p xedit_ffi

      # -- nifly (NIF file support) --
      - name: Cache nifly build
        uses: actions/cache@v4
        with:
          path: |
            rust-core/xedit_nif/nifly/build
            rust-core/xedit_nif/nifly_wrapper/build
          key: nifly-windows-${{ hashFiles('rust-core/xedit_nif/nifly/src/**', 'rust-core/xedit_nif/nifly/include/**', 'rust-core/xedit_nif/nifly_wrapper/*.cpp', 'rust-core/xedit_nif/nifly_wrapper/*.h') }}

      - name: Build nifly and nifly_wrapper
        run: |
          cd rust-core/xedit_nif/nifly
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build --config Release -j
          cd ../nifly_wrapper
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j
          dir build\Release\

      # -- Qt6 C++ GUI --
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Build Qt6 C++ GUI
        run: |
          cd qt-gui
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${env:Qt6_DIR}"
          cmake --build build --config Release -j
          dir build\Release\

      # -- Package Windows zip --
      - name: Assemble Windows distribution
        run: |
          mkdir dist

          # Copy main binary
          Copy-Item qt-gui\build\Release\xEdit.exe dist\

          # Copy Rust FFI library
          Copy-Item rust-core\target\release\xedit_ffi.dll dist\xedit_core.dll

          # Copy nifly wrapper
          $niflyDll = Get-ChildItem -Path rust-core\xedit_nif\nifly_wrapper\build -Recurse -Filter "nifly_wrapper.dll" | Select-Object -First 1
          if ($niflyDll) { Copy-Item $niflyDll.FullName dist\ }

          # Deploy Qt dependencies (windeployqt copies all needed DLLs + plugins)
          & windeployqt --release --no-translations --no-opengl-sw dist\xEdit.exe

          dir dist\

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: xEdit-windows-x86_64
          path: dist/

  # ---------------------------------------------------------------------------
  # Release: create a GitHub release on tag push
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: xEdit-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: xEdit-windows-x86_64
          path: xEdit-windows

      - name: Zip Windows artifact
        run: cd xEdit-windows && zip -r ../xEdit-windows-x86_64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            xEdit-x86_64.AppImage
            xEdit-windows-x86_64.zip
